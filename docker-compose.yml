services:
  mongodb:
    # MongoDB 5.0+ AVX talab qiladi — eski VPS CPU larda faqat 4.4 ishlaydi
    image: mongo:4.4.29
    container_name: avitus-mongodb
    restart: unless-stopped
    command: ['--wiredTigerCacheSizeGB', '0.25']
    environment:
      MONGO_INITDB_DATABASE: avitus-anketa
    volumes:
      - mongodb_data:/data/db
    networks:
      - avitus-net
    healthcheck:
      test: ['CMD', 'mongo', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    mem_limit: 512m

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: avitus-anketa-backend:latest
    container_name: avitus-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/avitus-anketa
      ADMIN_DIST_PATH: /app/apps/admin/dist
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — .env faylni to'ldiring}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required — .env faylni to'ldiring}
      TELEGRAM_ADMIN_BOT_TOKEN: ${TELEGRAM_ADMIN_BOT_TOKEN:-}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      TELEGRAM_RETRY_ATTEMPTS: ${TELEGRAM_RETRY_ATTEMPTS:-5}
      TELEGRAM_API_ROOT: ${TELEGRAM_API_ROOT:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - avitus-net
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: 768m

networks:
  avitus-net:
    driver: bridge

volumes:
  mongodb_data:
  uploads_data:
